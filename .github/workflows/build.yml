name: Build Universal Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64
          - name: Android64
            os: ubuntu-latest
            target: Android64

    steps:
      - uses: actions/checkout@v4

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}

  package:
    name: Package universal mod
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Combine platform packages
        uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - name: Upload universal package
        uses: actions/upload-artifact@v4
        with:
          name: pcpapc172.recorder-universal
          path: ${{ steps.build.outputs.build-output }}
          if-no-files-found: error
